name: Build ElshemyPXE

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: 'Product Name (shown in boot)'
        required: true
        default: 'ElshemyPXE'
      cert_country:
        description: 'Certificate Country Code'
        required: true
        default: 'EG'
      cert_org:
        description: 'Certificate Organization'
        required: true
        default: 'Elshemy'
      cert_days:
        description: 'Certificate validity (days)'
        required: true
        default: '3650'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # ── 1. Install build tools ───────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential liblzma-dev gcc binutils make perl git \
            openssl sbsigntool mtools dos2unix xz-utils shim-signed

      # ── 2. Checkout this repo ────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. Clone iPXE ────────────────────────────────────
      - name: Clone iPXE source
        run: git clone --depth=1 https://github.com/ipxe/ipxe.git

      # ── 4. Apply custom config ───────────────────────────
      - name: Apply ElshemyPXE configuration
        run: |
          mkdir -p ipxe/src/config/local
          dos2unix embed.ipxe
          echo "embed.ipxe ready"

      # ── 5. Build EFI files ───────────────────────────────
      - name: Build ipxe.efi (full drivers)
        run: |
          cd ipxe/src
          make bin-x86_64-efi/ipxe.efi EMBED=../../embed.ipxe -j1

      - name: Build snponly.efi (firmware NIC driver)
        run: |
          cd ipxe/src
          make bin-x86_64-efi/snponly.efi EMBED=../../embed.ipxe -j$(nproc)

      # ── 6. Generate certificate ──────────────────────────
      - name: Generate Secure Boot certificate
        run: |
          mkdir -p cert-output
          {
            echo '[req]'
            echo 'distinguished_name = dn'
            echo 'x509_extensions    = v3_uefi'
            echo 'prompt             = no'
            echo ''
            echo '[dn]'
            echo 'C  = ${{ github.event.inputs.cert_country }}'
            echo 'O  = ${{ github.event.inputs.cert_org }}'
            echo 'CN = ${{ github.event.inputs.product_name }} Secure Boot'
            echo ''
            echo '[v3_uefi]'
            echo 'subjectKeyIdentifier = hash'
            echo 'basicConstraints     = CA:FALSE'
            echo 'keyUsage             = digitalSignature'
          } > cert.cnf
          openssl genrsa -out cert-output/ElshemyPXE.key 2048 2>/dev/null
          openssl req -new -x509 \
            -key cert-output/ElshemyPXE.key \
            -out cert-output/ElshemyPXE.crt \
            -days ${{ github.event.inputs.cert_days }} \
            -config cert.cnf
          openssl x509 -in cert-output/ElshemyPXE.crt -outform DER -out cert-output/ElshemyPXE.cer
          cp cert-output/ElshemyPXE.crt cert-output/ElshemyPXE.pem
          echo "Certificate info:"
          openssl x509 -in cert-output/ElshemyPXE.crt -noout -subject -dates

      # ── 7. Sign EFI files ────────────────────────────────
      - name: Sign EFI files
        run: |
          mkdir -p signed-output
          sbsign \
            --key cert-output/ElshemyPXE.key \
            --cert cert-output/ElshemyPXE.crt \
            --output signed-output/ElshemyPXe.efi \
            ipxe/src/bin-x86_64-efi/ipxe.efi
          sbsign \
            --key cert-output/ElshemyPXE.key \
            --cert cert-output/ElshemyPXE.crt \
            --output signed-output/ElshemyPXe-snponly.efi \
            ipxe/src/bin-x86_64-efi/snponly.efi
          sbverify --cert cert-output/ElshemyPXE.crt signed-output/ElshemyPXe.efi && echo "ipxe.efi: OK" || echo "ipxe.efi: verify warning"
          sbverify --cert cert-output/ElshemyPXE.crt signed-output/ElshemyPXe-snponly.efi && echo "snponly.efi: OK" || echo "snponly.efi: verify warning"
          cp cert-output/ElshemyPXE.cer signed-output/
          cp cert-output/ElshemyPXE.pem signed-output/
          cp cert-output/ElshemyPXE.crt signed-output/

      # ── 8. Add shim (MOK blue screen support) ────────────
      - name: Add shim for MOK enrollment
        run: |
          mkdir -p mok-output

          # Copy Microsoft-signed shim files
          SHIM_DIR=$(dpkg -L shim-signed | grep shimx64 | head -1 | xargs dirname)
          echo "Shim dir: $SHIM_DIR"
          ls -la $SHIM_DIR/

          # shimx64.efi — المحمّل الأساسي (موقّع من Microsoft)
          find /usr/lib/shim /boot -name "shimx64.efi*" 2>/dev/null | head -5
          SHIM=$(find /usr/lib/shim /boot -name "shimx64.efi*" ! -name "*.dpkg*" 2>/dev/null | head -1)
          MM=$(find /usr/lib/shim /boot -name "mmx64.efi*" ! -name "*.dpkg*" 2>/dev/null | head -1)

          echo "Using shim: $SHIM"
          echo "Using mmx64: $MM"

          cp "$SHIM" mok-output/shimx64.efi
          cp "$MM"   mok-output/mmx64.efi

          # iPXE يتسمى grubx64.efi — ده اللي shim بيحمّله
          cp signed-output/ElshemyPXe.efi      mok-output/grubx64.efi
          cp signed-output/ElshemyPXe-snponly.efi mok-output/grubx64-snponly.efi

          # الشهادة — المستخدم يحطها على USB لتسجيلها من شاشة MOK
          cp cert-output/ElshemyPXE.cer mok-output/
          cp cert-output/ElshemyPXE.pem mok-output/

          echo "=== MOK output files ==="
          ls -lh mok-output/

      # ── 9. Upload artifacts ──────────────────────────────
      - name: Upload standard EFI files
        uses: actions/upload-artifact@v4
        with:
          name: ElshemyPXE-Standard
          path: signed-output/
          retention-days: 90

      - name: Upload MOK shim files
        uses: actions/upload-artifact@v4
        with:
          name: ElshemyPXE-MOK-Shim
          path: mok-output/
          retention-days: 90

      - name: Summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ElshemyPXE-Standard (بدون shim)" >> $GITHUB_STEP_SUMMARY
          echo "| File | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXe.efi\` | ملف البوت الرئيسي |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXe-snponly.efi\` | للبوردات الجديدة |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXE.cer\` | شهادة BIOS |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ElshemyPXE-MOK-Shim (شاشة MOK الزرقاء)" >> $GITHUB_STEP_SUMMARY
          echo "| File | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`shimx64.efi\` | المحمّل — موقّع من Microsoft ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| \`mmx64.efi\` | شاشة MOK الزرقاء |" >> $GITHUB_STEP_SUMMARY
          echo "| \`grubx64.efi\` | iPXE (بتاعنا) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXE.cer\` | حطه على USB للتسجيل |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### خطوات MOK أول مرة" >> $GITHUB_STEP_SUMMARY
          echo "1. حط \`shimx64.efi\`, \`mmx64.efi\`, \`grubx64.efi\` في الـ TFTP" >> $GITHUB_STEP_SUMMARY
          echo "2. حط \`ElshemyPXE.cer\` على USB (FAT32)" >> $GITHUB_STEP_SUMMARY
          echo "3. أول بوت: شاشة زرقاء → Enroll key from disk → اختار الـ .cer" >> $GITHUB_STEP_SUMMARY
          echo "4. Reboot → من هنا بوت تلقائي بدون أي شاشة" >> $GITHUB_STEP_SUMMARY
