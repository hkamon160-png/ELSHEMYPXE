name: Build ElshemyPXE

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: 'Product Name (shown in boot)'
        required: true
        default: 'ElshemyPXE'
      cert_country:
        description: 'Certificate Country Code'
        required: true
        default: 'EG'
      cert_org:
        description: 'Certificate Organization'
        required: true
        default: 'Elshemy'
      cert_days:
        description: 'Certificate validity (days)'
        required: true
        default: '3650'

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      # ── 1. Install build tools ───────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential liblzma-dev gcc binutils make perl git \
            openssl sbsigntool mtools dos2unix xz-utils

      # ── 2. Checkout this repo ────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 3. Clone iPXE ────────────────────────────────────
      - name: Clone iPXE source
        run: git clone --depth=1 https://github.com/ipxe/ipxe.git

      # ── 4. Apply custom config ───────────────────────────
      - name: Apply ElshemyPXE configuration
        run: |
          mkdir -p ipxe/src/config/local
          dos2unix embed.ipxe
          echo "embed.ipxe ready"
          ls -la ipxe/src/config/local/

      # ── 5. Build EFI files ───────────────────────────────
      - name: Build ipxe.efi (full drivers)
        run: |
          cd ipxe/src
          echo "GCC: $(gcc --version | head -1)"
          make bin-x86_64-efi/ipxe.efi EMBED=../../embed.ipxe -j1

      - name: Build snponly.efi (firmware NIC driver)
        run: |
          cd ipxe/src
          make bin-x86_64-efi/snponly.efi EMBED=../../embed.ipxe -j$(nproc)

      # ── 6. Generate certificate ──────────────────────────
      - name: Generate Secure Boot certificate
        run: |
          mkdir -p cert-output
          {
            echo '[req]'
            echo 'distinguished_name = dn'
            echo 'x509_extensions    = v3_uefi'
            echo 'prompt             = no'
            echo ''
            echo '[dn]'
            echo 'C  = ${{ github.event.inputs.cert_country }}'
            echo 'O  = ${{ github.event.inputs.cert_org }}'
            echo 'CN = ${{ github.event.inputs.product_name }} Secure Boot'
            echo ''
            echo '[v3_uefi]'
            echo 'subjectKeyIdentifier = hash'
            echo 'basicConstraints     = critical,CA:FALSE'
            echo 'keyUsage             = critical,digitalSignature'
            echo 'extendedKeyUsage     = 1.3.6.1.4.1.311.10.3.6'
          } > cert.cnf
          openssl genrsa -out cert-output/ElshemyPXE.key 2048 2>/dev/null
          openssl req -new -x509 \
            -key cert-output/ElshemyPXE.key \
            -out cert-output/ElshemyPXE.crt \
            -days ${{ github.event.inputs.cert_days }} \
            -config cert.cnf
          openssl x509 -in cert-output/ElshemyPXE.crt -outform DER -out cert-output/ElshemyPXE.cer
          cp cert-output/ElshemyPXE.crt cert-output/ElshemyPXE.pem
          echo "Certificate info:"
          openssl x509 -in cert-output/ElshemyPXE.crt -noout -subject -dates

      # ── 7. Sign EFI files ────────────────────────────────
      - name: Sign EFI files
        run: |
          mkdir -p signed-output
          echo "=== EFI files ==="
          ls -lh ipxe/src/bin-x86_64-efi/ipxe.efi ipxe/src/bin-x86_64-efi/snponly.efi
          file ipxe/src/bin-x86_64-efi/ipxe.efi
          echo "=== Signing ipxe.efi ==="
          sbsign \
            --key cert-output/ElshemyPXE.key \
            --cert cert-output/ElshemyPXE.crt \
            --output signed-output/ElshemyPXe.efi \
            ipxe/src/bin-x86_64-efi/ipxe.efi
          echo "=== Signing snponly.efi ==="
          sbsign \
            --key cert-output/ElshemyPXE.key \
            --cert cert-output/ElshemyPXE.crt \
            --output signed-output/ElshemyPXe-snponly.efi \
            ipxe/src/bin-x86_64-efi/snponly.efi
          echo "=== Verifying (non-fatal) ==="
          sbverify --cert cert-output/ElshemyPXE.crt signed-output/ElshemyPXe.efi && echo "ipxe.efi: OK" || echo "ipxe.efi: verify warning (files still usable)"
          sbverify --cert cert-output/ElshemyPXE.crt signed-output/ElshemyPXe-snponly.efi && echo "snponly.efi: OK" || echo "snponly.efi: verify warning (files still usable)"
          cp cert-output/ElshemyPXE.cer signed-output/
          cp cert-output/ElshemyPXE.pem signed-output/
          cp cert-output/ElshemyPXE.crt signed-output/
          echo "=== Output files ==="
          ls -lh signed-output/

      # ── 8. Upload artifacts ──────────────────────────────
      - name: Upload EFI files
        uses: actions/upload-artifact@v4
        with:
          name: ElshemyPXE-Boot-Files
          path: signed-output/
          retention-days: 90

      - name: Summary
        run: |
          echo "## Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "| File | Purpose |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXe.efi\` | Main boot file |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXe-snponly.efi\` | New boards with unknown NICs |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXE.cer\` | Certificate — ASUS/MSI/Gigabyte/ASRock |" >> $GITHUB_STEP_SUMMARY
          echo "| \`ElshemyPXE.pem\` | Certificate — Lenovo/old boards |" >> $GITHUB_STEP_SUMMARY
